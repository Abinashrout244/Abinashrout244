<svg xmlns="http://www.w3.org/2000/svg" width="700" height="680" viewBox="0 0 700 680">
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 12px; }
    .bar { stroke: #30363d; stroke-width: 1; }
    .title { fill: #7d8590; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; text-anchor: middle; }
    
    .prompt-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      fill: #7d8590;
    }
    .user-text { fill: #c9d1d9; }
    
    .terminal-content {
      margin: 0;
      padding: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      line-height: 11px;
      color: #c9d1d9;
      font-weight: bold;
      background: transparent;
      overflow: hidden;
      opacity: 0;
      clip-path: inset(0 0 100% 0);
      animation: type-down 2.5s steps(60, end) forwards;
      animation-delay: 0.2s;
    }

    .cursor {
      fill: #c9d1d9;
      animation: blink 1s infinite;
    }

    @keyframes type-down {
      from { opacity: 1; clip-path: inset(0 0 100% 0); }
      to { opacity: 1; clip-path: inset(0 0 0 0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <rect width="698" height="678" x="1" y="1" class="bg" />
  <line x1="0" y1="30" x2="700" y2="30" class="bar" />
  
  <circle cx="20" cy="15" r="5" fill="#ff5f56" />
  <circle cx="36" cy="15" r="5" fill="#ffbd2e" />
  <circle cx="52" cy="15" r="5" fill="#27c93f" />
  <text x="350" y="19" class="title">abinash@github: ~$ ./portrait.sh</text>

